name: .NET

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

env:
  AKSHAT_DOTNET_VERSION: 10.0.x
  AKSHAT_MAUI_PROJECT: ExampleAppMAUI/ExampleAppMAUI.csproj
  AKSHAT_SHARED_PROJECT: ExampleAppMAUI.Shared/ExampleAppMAUI.Shared.csproj
  AKSHAT_TEST_PROJECT: ExampleAppMAUI.Tests/ExampleAppMAUI.Tests.csproj
  AKSHAT_WINDOWS_FRAMEWORK: net10.0-windows10.0.19041.0

jobs:
  shared-validation:
    name: Shared validation (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.AKSHAT_DOTNET_VERSION }}

      - name: Restore test project
        run: dotnet restore "${{ env.AKSHAT_TEST_PROJECT }}"

      - name: Build test project
        run: dotnet build "${{ env.AKSHAT_TEST_PROJECT }}" --no-restore

      - name: Run app tests
        run: dotnet run --project "${{ env.AKSHAT_TEST_PROJECT }}" --no-restore

  windows-desktop-build:
    name: Windows desktop MAUI build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.AKSHAT_DOTNET_VERSION }}

      - name: Install Windows MAUI workload
        run: dotnet workload install maui-windows

      - name: Restore MAUI project
        run: dotnet restore "${{ env.AKSHAT_MAUI_PROJECT }}" -p:TargetFramework="${{ env.AKSHAT_WINDOWS_FRAMEWORK }}"

      - name: Restore shared project
        run: dotnet restore "${{ env.AKSHAT_SHARED_PROJECT }}"

      - name: Build Windows desktop app
        run: dotnet build "${{ env.AKSHAT_MAUI_PROJECT }}" -f "${{ env.AKSHAT_WINDOWS_FRAMEWORK }}" --no-restore
